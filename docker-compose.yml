version: '3.8'

volumes:
  n8n_storage:
  ollama_storage:
  qdrant_storage:
  open-webui:
  flowise:
  supabase_db_data:
  supabase_storage_data:

networks:
  freya-net:
    driver: bridge

x-n8n: &service-n8n
  image: n8nio/n8n:latest
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=db
    - DB_POSTGRESDB_USER=postgres
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - DB_POSTGRESDB_DATABASE=postgres
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_JWT_SECRET}
    - NODE_ENV=production
    - N8N_SECURE_COOKIE=FALSE
  networks:
    - freya-net

x-ollama: &service-ollama
  image: ollama/ollama:latest
  restart: unless-stopped
  volumes:
    - ollama_storage:/root/.ollama
    - /etc/ssl/certs:/etc/ssl/certs:ro
  environment:
    - OLLAMA_KEEP_ALIVE=24h
    - OLLAMA_HOST=0.0.0.0
    - OLLAMA_INSECURE=true
    - SSL_CERT_DIR=/etc/ssl/certs
  networks:
    - freya-net

services:
  # Database
  db:
    image: supabase/postgres:15.1.0.117
    restart: unless-stopped
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - freya-net

  # Storage
  storage:
    image: supabase/storage-api:latest
    depends_on:
      - db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REGION: ${STORAGE_REGION}
      GLOBAL_S3_BUCKET: ${STORAGE_S3_BUCKET}
      PGRST_JWT_SECRET: ${N8N_JWT_SECRET}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: 00000000-0000-0000-0000-000000000000
      PROJECT_REF: default
      ANON_KEY: ${N8N_JWT_SECRET}
    volumes:
      - supabase_storage_data:/var/lib/storage
    networks:
      - freya-net

  # n8n Workflow Automation
  n8n:
    <<: *service-n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./shared:/data/shared
    depends_on:
      - db
    environment:
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}

  # Vector Database
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - freya-net

  # Flow-based Programming Tool
  flowise:
    image: flowiseai/flowise
    restart: unless-stopped
    container_name: flowise
    environment:
      - PORT=3001
      - HOST=0.0.0.0
    ports:
      - "${FLOWISE_PORT:-3001}:3001"
    volumes:
      - flowise:/root/.flowise
    networks:
      - freya-net

  # Web UI for Ollama (CPU Version)
  open-webui-cpu:
    profiles: ["cpu"]
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    container_name: open-webui
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URLS=http://ollama-cpu:11434
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - WEBUI_NAME=Freya AI
      - WEBUI_URL=${WEBUI_URL:-http://localhost:3000}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    volumes:
      - open-webui:/app/backend/data
    networks:
      - freya-net
    depends_on:
      - ollama-cpu

  # Web UI for Ollama (GPU Version)
  open-webui-gpu:
    profiles: ["gpu-nvidia"]
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    container_name: open-webui
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URLS=http://ollama-gpu:11434
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - WEBUI_NAME=Freya AI
      - WEBUI_URL=http://localhost:${WEBUI_PORT:-3000}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_ALLOW_INSECURE=true
    volumes:
      - open-webui:/app/backend/data
    networks:
      - freya-net
    depends_on:
      - ollama-gpu

  # Ollama GPU Service (NVIDIA)
  ollama-gpu:
    <<: *service-ollama
    profiles:
      - gpu-nvidia
    container_name: ollama-gpu
    volumes:
      - ollama_storage:/root/.ollama
      - /usr/share/nvidia:/usr/share/nvidia:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "11434:11434"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=http://0.0.0.0:11434,http://localhost:11434
      - OLLAMA_INSECURE=true
      - SSL_CERT_DIR=/etc/ssl/certs
      - OLLAMA_MODELS=llama2,mistral,codellama,neural-chat
    command: serve

  # Open WebUI Service
  open-webui:
    profiles: ["cpu"]
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    container_name: open-webui
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URLS=http://ollama-cpu:11434
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - WEBUI_NAME=Freya AI
      - WEBUI_URL=${WEBUI_URL:-http://localhost:3000}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    volumes:
      - open-webui:/app/backend/data
    networks:
      - freya-net
    depends_on:
      - ollama-cpu 